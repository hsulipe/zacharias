version: "3.9"

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ged_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ged_user:ged_password@postgres:5432/ged_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ged_minio_access
      MINIO_SECRET_KEY: ged_minio_secret
      MINIO_BUCKET: ged-documents
      MINIO_USE_SSL: "false"
      JWT_SECRET: change_me_in_production_jwt_secret_32chars
      JWT_REFRESH_SECRET: change_me_in_production_refresh_secret
      JWT_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CORS_ORIGIN: http://localhost:5173
      MAX_FILE_SIZE_MB: 50
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: "noreply@ged.local"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - ged_net

  ocr-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: ged_ocr_worker
    restart: unless-stopped
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://ged_user:ged_password@postgres:5432/ged_db
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ged_minio_access
      MINIO_SECRET_KEY: ged_minio_secret
      MINIO_BUCKET: ged-documents
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - ged_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ged_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ged_net

  postgres:
    image: postgres:16-alpine
    container_name: ged_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ged_user
      POSTGRES_PASSWORD: ged_password
      POSTGRES_DB: ged_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ged_user -d ged_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ged_net

  redis:
    image: redis:7-alpine
    container_name: ged_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ged_net

  minio:
    image: minio/minio:latest
    container_name: ged_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ged_minio_access
      MINIO_ROOT_PASSWORD: ged_minio_secret
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ged_net

  nginx:
    image: nginx:alpine
    container_name: ged_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - ged_net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  ged_net:
    driver: bridge
