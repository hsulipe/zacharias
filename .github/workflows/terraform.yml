name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

concurrency:
  group: terraform-production
  cancel-in-progress: false

env:
  TF_VERSION: "1.8.5"

jobs:
  terraform:
    name: Terraform ${{ github.event_name == 'pull_request' && 'Plan' || 'Apply' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Generate terraform.tfvars
        run: |
          cat > terraform.tfvars <<EOF
          project_id  = "${{ secrets.GCP_PROJECT_ID }}"
          region      = "${{ vars.GCP_REGION }}"
          environment = "${{ vars.ENVIRONMENT }}"

          github_org  = "${{ github.repository_owner }}"
          github_repo = "${{ github.event.repository.name }}"

          db_name     = "${{ vars.DB_NAME }}"
          db_user     = "${{ vars.DB_USER }}"
          db_password = "${{ secrets.DB_PASSWORD }}"
          db_tier     = "${{ vars.DB_TIER }}"

          jwt_secret         = "${{ secrets.JWT_SECRET }}"
          jwt_refresh_secret = "${{ secrets.JWT_REFRESH_SECRET }}"

          cors_origin      = "${{ vars.CORS_ORIGIN }}"
          max_file_size_mb = ${{ vars.MAX_FILE_SIZE_MB }}

          smtp_host = "${{ vars.SMTP_HOST }}"
          smtp_port = ${{ vars.SMTP_PORT }}
          smtp_user = "${{ secrets.SMTP_USER }}"
          smtp_pass = "${{ secrets.SMTP_PASS }}"
          smtp_from = "${{ vars.SMTP_FROM }}"
          EOF

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="bucket=tf-state-${{ secrets.GCP_PROJECT_ID }}" \
            -backend-config="prefix=ged"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -out=tfplan

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan \`${{ steps.plan.outcome }}\`
            <details><summary>Show Plan</summary>

            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -auto-approve tfplan
